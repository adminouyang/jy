name: IPTV Playlist Auto Update

on:
  schedule:
    - cron: '0 22 * * *'   # 每天 UTC 0:00（北京时间 06:00）
  workflow_dispatch:

permissions:
  contents: write   # 允许提交代码

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Hotel/Remote Access
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Create logs directory
        run: mkdir -p logs

      - name: Run IPTV update script
        env:
          EPG_URL: ${{ secrets.EPG_URL || 'https://epg.112114.xyz/pp.xml' }}
          LOGO_BASE_URL: ${{ secrets.LOGO_BASE_URL || 'https://ghfast.top/https://raw.githubusercontent.com/Jarrey/iptv_logo/main/tv/' }}
          OUTPUT_M3U8: output.m3u8
          OUTPUT_TXT: output.txt
          LOG_FILE: logs/cron.log
        run: python remote_hotel.py

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 修改提交信息，包含北京时间
          BEIJING_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          # 添加生成的文件
          git add output.m3u8 output.txt logs/cron.log
          
          # 如果有变化才提交
          git diff --quiet && git diff --staged --quiet || {
            git commit -m "Auto-update IPTV playlist [$BEIJING_TIME]"
            
            # 先拉取远程最新代码（rebase 避免产生合并提交）
            git pull --rebase origin main
            
            # 再推送
            git push
          }
