name: IPTV Playlist Auto Update

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 0:00（北京时间 08:00）
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Hotel/Remote Access
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # 移除 cache，因为仓库没有 requirements.txt

      - name: Install dependencies
        run: pip install requests

      - name: Create logs directory
        run: mkdir -p logs

      - name: Run IPTV update script
        env:
          EPG_URL: ${{ secrets.EPG_URL || 'https://epg.112114.xyz/pp.xml' }}
          LOGO_BASE_URL: ${{ secrets.LOGO_BASE_URL || 'https://ghfast.top/https://raw.githubusercontent.com/Jarrey/iptv_logo/main/tv/' }}
          OUTPUT_M3U8: output.m3u8
          OUTPUT_TXT: output.txt
          LOG_FILE: logs/cron.log
        run: python remote_hotel.py

      - name: Verify output files
        run: |
          echo "Checking generated files..."
          ls -lh output.m3u8 output.txt
          echo "Lines in M3U8: $(wc -l < output.m3u8)"
          echo "Lines in TXT: $(wc -l < output.txt)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iptv-playlist-${{ github.run_id }}
          path: |
            Hotel/Remote Access/output.m3u8
            Hotel/Remote Access/output.txt
            Hotel/Remote Access/logs/cron.log
          retention-days: 30
