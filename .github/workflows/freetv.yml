name: freetv
on:
  schedule:
    - cron: 0 11,23 * * *
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0  # 获取所有历史记录
          
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.x
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install lxml
          pip install beautifulsoup4
          
      - name: freetv
        run: |
          echo "开始运行freetv.py脚本..."
          python freetv/freetv.py
          
      - name: 提交更新
        run: |
          cd $GITHUB_WORKSPACE
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 先拉取远程的最新更改
          git pull origin main --rebase
          
          # 然后添加、提交和推送
          git add .
          
          # 检查是否有更改需要提交
          if git diff --cached --quiet; then
            echo "没有更改，跳过提交"
          else
            git commit -m "增加频道链接速度检测 $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
