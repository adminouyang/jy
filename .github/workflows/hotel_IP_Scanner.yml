name: hotel IP Scanner

on:
  schedule:
    - cron: '0 9,21 * * *'
  workflow_dispatch:
permissions:
          contents: write

# env:
#   # 提前测试 Node.js 24
#   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  hotel-ip:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: main
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp asyncio
        
    - name: Create directories
      run: |
        mkdir -p Hotel/ip/ip
        
    - name: 扫描hotel IP
      run: |
        cat > hotel_IP_Scanner.py << 'EOF'
        import os
        import time
        import asyncio
        import aiohttp
        import json
        import argparse
        from typing import List, Tuple, Set, Dict
        import re
        from datetime import datetime
        import sys
        from dataclasses import dataclass
        from concurrent.futures import ProcessPoolExecutor
        import signal

        # 全局配置
        MAX_CONCURRENT = 200  # 最大并发连接数
        REQUEST_TIMEOUT = 2.5  # 请求超时时间
        CONNECT_TIMEOUT = 2.0  # 连接超时时间
        HEADERS = {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
            'Accept': 'application/json,text/plain,*/*',
            'Accept-Language': 'zh-CN,zh;q=0.9',
            'Connection': 'keep-alive',
            'Accept-Encoding': 'gzip, deflate'
        }

        @dataclass
        class IPConfig:
            base_ip: str
            port: str
            option: int
            region: str
            original_line: str
    
        class Scanner:
            def __init__(self, max_workers: int = 50):
                self.max_workers = max_workers
                self.session = None
                self.connector = None
                self.found_ips = set()
                self.lock = asyncio.Lock()
                self.total_scanned = 0
                self.total_found = 0
                self.start_time = None
        
            async def __aenter__(self):
                # 创建连接器，启用连接池
                self.connector = aiohttp.TCPConnector(
                    limit=self.max_workers,
                    limit_per_host=10,
                    ttl_dns_cache=300,
                    force_close=False,
                    enable_cleanup_closed=True
                )
        
                # 创建会话
                self.session = aiohttp.ClientSession(
                    connector=self.connector,
                    headers=HEADERS,
                    timeout=aiohttp.ClientTimeout(
                        total=REQUEST_TIMEOUT,
                        connect=CONNECT_TIMEOUT,
                        sock_read=REQUEST_TIMEOUT
                    ),
                    trust_env=True
                )
        
                return self
        
            async def __aexit__(self, exc_type, exc_val, exc_tb):
                if self.session:
                    await self.session.close()
                if self.connector:
                    await self.connector.close()
            
            def expand_part(self, part: str) -> List[int]:
                """展开IP段范围，如 1-10 -> [1,2,...,10]"""
                if '-' in part:
                    start, end = map(int, part.split('-'))
                    return list(range(start, end + 1))
                return [int(part)]
        
            def generate_ip_list(self, ip: str, port: str, option: int) -> List[str]:
                """生成要扫描的IP列表"""
                parts = ip.split('.')
                if len(parts) != 4:
                    return []
            
                a, b, c, d = parts
        
                if option == 0:
                    # 只扫描D段
                    ips = []
                    d_val = int(d)
                    for d_range in range(1, 256):
                        ips.append(f"{a}.{b}.{c}.{d_range}:{port}")
                    return ips
            
                elif option == 1:
                    # 扫描C段范围和D段
                    ips = []
                    c_range = self.expand_part(c)
                    for c_val in c_range:
                        for d_val in range(1, 256):
                            ips.append(f"{a}.{b}.{c_val}.{d_val}:{port}")
                    return ips
            
                elif option == 3:
                    # 扫描B段、C段、D段
                    ips = []
                    b_range = self.expand_part(b)
                    c_range = self.expand_part(c)
            
                    for b_val in b_range:
                        for c_val in c_range:
                            for d_val in range(1, 256):
                                ips.append(f"{a}.{b_val}.{c_val}.{d_val}:{port}")
                    return ips
            
                return []
        
            async def check_ip(self, ip_port: str) -> str:
                """检查单个IP地址，返回有效的IP或None"""
                url_endpoints = [
                    "/iptv/live/1000.json?key=txiptv",
                    "/ZHGXTV/Public/json/live_interface.txt"
                ]
        
                for endpoint in url_endpoints:
                    url = f"http://{ip_port}{endpoint}"
                    try:
                        async with self.session.get(
                            url,
                            ssl=False,
                            allow_redirects=True
                        ) as response:
                            if response.status == 200:
                                text = await response.text()
                                if "tsfile" in text or "hls" in text or "m3u8" in text or "live" in text.lower():
                                    return ip_port
                    except (aiohttp.ClientError, asyncio.TimeoutError, OSError):
                        continue
                    except Exception as e:
                        continue
                
                return None
        
            async def scan_batch(self, ip_list: List[str], batch_num: int, total_batches: int) -> Set[str]:
                """扫描一批IP地址"""
                batch_found = set()
                batch_size = len(ip_list)
        
                # 创建异步任务列表
                tasks = []
                for ip_port in ip_list:
                    task = asyncio.create_task(self.check_ip(ip_port))
                    tasks.append(task)
            
                # 等待所有任务完成
                completed = 0
                for task in asyncio.as_completed(tasks):
                    try:
                        result = await task
                        if result:
                            batch_found.add(result)
                    except Exception as e:
                        pass
                
                    completed += 1
                    if completed % 50 == 0:
                        # 更新进度
                        async with self.lock:
                            self.total_scanned += 50
                    
                async with self.lock:
                    self.total_scanned += completed % 50
                    self.total_found += len(batch_found)
            
                return batch_found
        
            async def scan_ips(self, ip_list: List[str], region: str) -> Set[str]:
                """扫描IP列表"""
                if not ip_list:
                    return set()
            
                total_ips = len(ip_list)
                print(f"  开始扫描 {region}，共 {total_ips} 个IP")
        
                if total_ips > 10000:
                    batch_size = 1000
                elif total_ips > 1000:
                    batch_size = 500
                else:
                    batch_size = 200
            
                batches = []
                for i in range(0, total_ips, batch_size):
                    batches.append(ip_list[i:i + batch_size])
            
                total_batches = len(batches)
                found_ips = set()
        
                # 使用信号量控制并发批次
                semaphore = asyncio.Semaphore(5)
        
                async def process_batch(batch: List[str], batch_num: int):
                    async with semaphore:
                        batch_found = await self.scan_batch(batch, batch_num, total_batches)
                        if batch_found:
                            async with self.lock:
                                found_ips.update(batch_found)
                        
                        # 显示进度
                        elapsed = time.time() - self.start_time
                        ips_per_second = self.total_scanned / elapsed if elapsed > 0 else 0
                        remaining = (total_ips - self.total_scanned) / ips_per_second if ips_per_second > 0 else 0
                
                        print(f"  进度: {self.total_scanned}/{total_ips} ({self.total_scanned/total_ips*100:.1f}%) | "
                              f"速度: {ips_per_second:.1f} IP/s | "
                              f"已找到: {self.total_found} | "
                              f"预计剩余: {remaining:.0f}s")
        
                # 创建批次任务
                batch_tasks = []
                for i, batch in enumerate(batches, 1):
                    task = asyncio.create_task(process_batch(batch, i))
                    batch_tasks.append(task)
            
                # 等待所有批次完成
                await asyncio.gather(*batch_tasks)
        
                return found_ips
        
        def parse_config_line(line: str, line_num: int) -> IPConfig:
            """解析配置文件行"""
            line = line.strip()
            original_line = line
    
            if not line or line.startswith("#"):
                return None
        
            try:
                # 解析地区
                if '$' in line:
                    config_part, region = line.rsplit('$', 1)
                else:
                    config_part = line
                    region = "未知地区"
            
                config_part = config_part.strip()
                region = region.strip()
        
                if not config_part or not region:
                    return None
            
                # 解析option
                option = 0
                if ',' in config_part:
                    ip_port_part, option_part = config_part.split(',')
                    ip_port_part = ip_port_part.strip()
                    option_part = option_part.strip()
            
                    if option_part in ['0', '1', '3']:
                        option = int(option_part)
                    else:
                        option = 0
                else:
                    ip_port_part = config_part
                    option = 0
            
                # 解析IP和端口
                if ":" not in ip_port_part:
                    return None
            
                ip_part, port = ip_port_part.split(':')
                ip_part = ip_part.strip()
                port = port.strip()
        
                if not ip_part or not port:
                    return None
            
                # 验证IP格式
                parts = ip_part.split('.')
                if len(parts) != 4:
                    return None
            
                # 验证option=3的特殊格式
                if option == 3:
                    a, b_part, c_part, d = parts
                    # 验证b段和c段格式
                    for part in [b_part, c_part]:
                        if not re.match(r'^\d+(-\d+)?$', part):
                            return None
                    
                return IPConfig(
                    base_ip=ip_part,
                    port=port,
                    option=option,
                    region=region,
                    original_line=original_line
                )
        
            except Exception as e:
                return None
        
        def read_config(config_file: str) -> List[IPConfig]:
            """读取配置文件"""
            configs = []
    
            try:
                with open(config_file, 'r', encoding='utf-8') as f:
                    for line_num, line in enumerate(f, 1):
                        config = parse_config_line(line, line_num)
                        if config:
                            configs.append(config)
                    
            except Exception as e:
                print(f"读取配置文件错误: {e}")
        
            return configs
    
        async def process_config(config: IPConfig, scanner: Scanner) -> Set[str]:
            """处理单个配置"""
            print(f"\n{'='*60}")
            print(f"配置: {config.original_line}")
            print(f"  地区: {config.region}, option={config.option}")
    
            # 生成IP列表
            ip_list = scanner.generate_ip_list(config.base_ip, config.port, config.option)
    
            if not ip_list:
                print("  错误: 无法生成IP列表")
                return set()
        
            print(f"  生成 {len(ip_list)} 个IP地址")
    
            if config.option == 0:
                print("  扫描范围: D段1-255")
            elif config.option == 1:
                print("  扫描范围: C段范围和D段1-255")
            elif config.option == 3:
                print("  扫描范围: B段、C段、D段1-255")
        
            # 重置扫描计数器
            scanner.total_scanned = 0
            scanner.total_found = 0
    
            # 开始扫描
            found_ips = await scanner.scan_ips(ip_list, config.region)
    
            print(f"  扫描完成，找到 {len(found_ips)} 个有效IP")
    
            return found_ips
    
        async def main():
            parser = argparse.ArgumentParser(description='高效酒店IP扫描工具')
            parser.add_argument('--input', type=str, default='Hotel/ip/ip/Hotel_ips.txt', 
                              help='输入配置文件路径')
            parser.add_argument('--output', type=str, default='Hotel/ip', 
                              help='输出目录')
            parser.add_argument('--workers', type=int, default=200,
                              help='并发连接数，默认200')
    
            args = parser.parse_args()
    
            if not os.path.exists(args.input):
                print(f"错误: 配置文件不存在: {args.input}")
                return
        
            # 读取配置
            configs = read_config(args.input)
            if not configs:
                print(f"没有找到有效配置: {args.input}")
                return
        
            print(f"找到 {len(configs)} 个有效配置")
    
            # 按option排序，让option=0的先扫描（IP数量较少）
            configs.sort(key=lambda x: (x.option, len(scanner.generate_ip_list(x.base_ip, x.port, x.option))))
    
            # 创建扫描器
            async with Scanner(max_workers=args.workers) as scanner:
                scanner.start_time = time.time()
        
                # 按地区分组结果
                region_results = {}
        
                for i, config in enumerate(configs, 1):
                    print(f"\n[处理配置 {i}/{len(configs)}]")
            
                    # 计算配置的IP数量
                    ip_count = len(scanner.generate_ip_list(config.base_ip, config.port, config.option))
            
                    # 如果IP数量太多，提示用户
                    if ip_count > 100000:
                        print(f"警告: 此配置将生成 {ip_count:,} 个IP，可能需要较长时间")
                        print("按 Ctrl+C 可中断扫描")
                
                    found_ips = await process_config(config, scanner)
            
                    if found_ips:
                        if config.region not in region_results:
                            region_results[config.region] = set()
                        region_results[config.region].update(found_ips)
                
                    # 扫描间隔
                    if i < len(configs):
                        print("等待3秒后继续...")
                        await asyncio.sleep(3)
                
            # 保存结果
            if region_results:
                os.makedirs(args.output, exist_ok=True)
        
                total_ips = 0
                for region, ips in region_results.items():
                    if ips:
                        safe_region = re.sub(r'[\\/*?:"<>|]', "_", region)
                        output_file = os.path.join(args.output, f"{safe_region}.txt")
                
                        with open(output_file, 'w', encoding='utf-8') as f:
                            for ip in sorted(ips):
                                f.write(f"{ip}\n")
                        
                        print(f"地区 '{region}' 的 {len(ips)} 个IP已保存到: {output_file}")
                        total_ips += len(ips)
                
                print(f"\n{'='*60}")
                print(f"扫描完成! 共找到 {total_ips} 个唯一有效IP")
                elapsed = time.time() - scanner.start_time
                print(f"总用时: {elapsed:.1f}秒")
        
            else:
                print("\n没有找到有效IP")
        
        if __name__ == "__main__":
            # 设置事件循环策略
            if sys.platform == 'win32':
                asyncio.set_event_loop_policy(asyncio.WindowsSelectorEventLoopPolicy())
        
            # 运行主程序
            try:
                asyncio.run(main())
            except KeyboardInterrupt:
                print("\n\n扫描被用户中断")
            except Exception as e:
                print(f"\n发生错误: {e}")
        EOF
        
        python hotel_IP_Scanner.py
    - name: Commit and push if changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        if [ -n "$(git status --porcelain Hotel/ip/*.txt 2>/dev/null)" ]; then
          git add Hotel/ip/*.txt
          git commit -m "扫描更新 hotel IP $(date '+%Y-%m-%d %H:%M:%S')"
          git pull --rebase origin main
          git push origin main
        else
          echo "没有发现文件变化，跳过提交"
        fi
      
