name: hotel IP Scanner

on:
  schedule:
    - cron: '0 10,22 * * *'
  workflow_dispatch:
permissions:
          contents: write

env:
  # 提前测试 Node.js 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  hotel-ip:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: main
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Create directories
      run: |
        mkdir -p Hotel/ip/ip
        
    - name: 扫描hotel IP
      run: |
        cat > hotel_IP_Scanner.py << 'EOF'
        # ... [Python脚本内容保持不变] ...
        EOF
        
        python hotel_IP_Scanner.py
      
    - name: 配置Git用户
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
      
    - name: 暂存扫描结果
      run: |
        if [ -n "$(find Hotel/ip -name "*.txt" -newer hotel_IP_Scanner.py 2>/dev/null)" ]; then
          echo "发现新的扫描结果文件"
          git add Hotel/ip/*.txt
        else
          echo "没有发现新的扫描结果文件"
        fi
      
    - name: 拉取远程更改
      run: |
        if git diff --cached --quiet; then
          echo "没有暂存的更改，直接拉取"
        else
          echo "有暂存的更改，先提交再拉取"
          git commit -m "临时提交: 扫描结果 $(date '+%Y-%m-%d %H:%M:%S')"
        fi
        
        echo "正在拉取远程最新更改..."
        git pull origin main --rebase
      
    - name: 提交最终更改
      run: |
        if [ -n "$(git status --porcelain Hotel/ip/*.txt 2>/dev/null)" ]; then
          git add Hotel/ip/*.txt
          git commit -m "扫描更新 hotel IP $(date '+%Y-%m-%d %H:%M:%S')"
          echo "正在推送到远程仓库..."
          git push origin main
        else
          echo "没有发现文件变化，跳过提交"
        fi
